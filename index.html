
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STAR OBFUSCATOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020205;
            --bg-panel: #08080e;
            --primary: #fcd34d; /* Star Yellow */
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border: #1e293b;
            --success: #fbbf24;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Starfield Background Effect */
        .starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
        }

        .bg-glow {
            position: fixed; top: 0; left: 50%; width: 50%; height: 50%; z-index: -1;
            background: radial-gradient(circle at 50% 0%, rgba(252, 211, 77, 0.05) 0%, transparent 70%);
            transform: translateX(-50%);
        }

        nav {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; background: rgba(8, 8, 14, 0.9);
            backdrop-filter: blur(20px);
        }

        .logo { font-weight: 800; letter-spacing: 0.1em; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;}
        .logo span { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .app-container {
            display: grid; grid-template-columns: 280px 1fr;
            height: calc(100vh - 60px);
        }

        aside {
            background: var(--bg-panel); border-right: 1px solid var(--border);
            padding: 24px; display: flex; flex-direction: column; gap: 20px;
        }

        .setting-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .setting-card h3 { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px 0; letter-spacing: 0.1em; }
        
        .control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        
        .toggle { position: relative; width: 34px; height: 16px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e293b; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 10px; width: 10px;
            left: 3px; bottom: 3px; background-color: #cbd5e1; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(18px); background-color: var(--bg-deep); }

        .main-workspace { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; }
        .editors { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; min-height: 0; }
        
        .editor-wrap { display: flex; flex-direction: column; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .editor-label { padding: 10px 16px; background: rgba(255,255,255,0.03); font-size: 0.7rem; font-weight: 700; color: var(--text-muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        textarea {
            flex: 1; background: transparent; border: none; color: #e2e8f0;
            padding: 16px; font-family: var(--font-code); font-size: 13px; resize: none; line-height: 1.6;
        }

        .btn-primary {
            background: var(--primary); color: var(--bg-deep); border: none; padding: 14px;
            border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 0 15px rgba(252, 211, 77, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

        .terminal {
            height: 140px; background: #000; border-radius: 8px; border: 1px solid var(--border);
            padding: 12px; font-family: var(--font-code); font-size: 11px; overflow-y: auto; color: #94a3b8;
        }
        .log-entry.success { color: var(--success); }
        .log-entry.process { color: var(--primary); }
    </style>
</head>
<body>

    <div class="starfield"></div>
    <div class="bg-glow"></div>
    <nav>
        <div class="logo"><span>STAR</span> OBFUSCATOR</div>
        <div style="font-size: 0.7rem; color: var(--text-muted); font-weight: 700;">GALAXY-BUILD 3.8.1</div>
    </nav>

    <div class="app-container">
        <aside>
            <div class="setting-card">
                <h3>Star System</h3>
                <div class="control">
                    <span>Bytecode VM</span>
                    <label class="toggle"><input type="checkbox" checked disabled><span class="slider"></span></label>
                </div>
                <div class="control">
                    <span>Barcode Meta</span>
                    <label class="toggle"><input type="checkbox" id="opt-barcode" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="setting-card">
                <h3>Atmospheric Layers</h3>
                <div class="control">
                    <span>Rotation Flow</span>
                    <label class="toggle"><input type="checkbox" id="opt-rot" checked><span class="slider"></span></label>
                </div>
                <div class="control">
                    <span>XOR Matrix</span>
                    <label class="toggle"><input type="checkbox" id="opt-xor" checked><span class="slider"></span></label>
                </div>
                <div class="control">
                    <span>Inverse Binary</span>
                    <label class="toggle"><input type="checkbox" id="opt-inv" checked><span class="slider"></span></label>
                </div>
            </div>

            <button class="btn-primary" id="buildBtn" onclick="runHybridBuild()">do the thing</button>
        </aside>

        <main class="main-workspace">
            <div class="editors">
                <div class="editor-wrap">
                    <div class="editor-label">SOURCE CODE</div>
                    <textarea id="input" spellcheck="false" placeholder="-- Paste Lua script here..."></textarea>
                </div>
                <div class="editor-wrap">
                    <div class="editor-label">STAR_PAYLOAD.LUA <span style="cursor:pointer; color: var(--primary);" onclick="copyResult()">[COPY]</span></div>
                    <textarea id="output" readonly spellcheck="false" placeholder="-- Output will be generated here..."></textarea>
                </div>
            </div>

            <div class="terminal" id="logs">
                <div class="log-entry">STAR Kernel online. All systems nominal.</div>
            </div>
        </main>
    </div>

<script>
    const $ = id => document.getElementById(id);
    const log = (m, t='') => {
        const d = document.createElement('div');
        d.className = 'log-entry ' + t;
        d.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
        $('logs').appendChild(d);
        $('logs').scrollTop = $('logs').scrollHeight;
    };

    function randName(l=14) {
        if ($('opt-barcode').checked) {
            const c = ['I', 'l', '1'];
            return "I" + [...Array(l)].map(() => c[Math.floor(Math.random()*c.length)]).join("");
        }
        return "_" + Math.random().toString(36).slice(2, 11).toUpperCase();
    }

    const STAR_WATERMARK = `
--[[ 
⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
▀█▀ █▀█ █░█ █▀█ █▄░█ █▀▀
░█░ █▀▄ █▄█ █▄█ █░▀█ █▄█
⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
        MIYU OBFUSCATOR
]]\n`;

    function wrapLayer(code, type) {
        const v_run = randName();
        const v_data = randName();
        const v_tbl = randName();
        const v_it = randName();
        const v_res = randName();
        const v_load = randName();
        
        const bytes = new TextEncoder().encode(code);
        let processed = "";
        let logic = "";

        if (type === "rotation") {
            const offset = Math.floor(Math.random() * 60) + 15;
            for(let b of bytes) processed += "\\" + ((b + offset) % 256);
            logic = `table.insert(${v_tbl},string.char((${v_data}:byte(${v_it})-${offset})%256))`;
        } else if (type === "xor") {
            const key = Math.floor(Math.random() * 254) + 1;
            for(let b of bytes) processed += "\\" + (b ^ key);
            logic = `table.insert(${v_tbl},string.char(bit32.bxor(${v_data}:byte(${v_it}), ${key})))`;
        } else if (type === "inversion") {
            for(let b of bytes) processed += "\\" + (255 - b);
            logic = `table.insert(${v_tbl},string.char(255 - ${v_data}:byte(${v_it})))`;
        }

        return `local function ${v_run}() local ${v_data}="${processed}"; local ${v_tbl}={}; for ${v_it}=1,#${v_data} do ${logic} end; local ${v_res}=table.concat(${v_tbl}); local ${v_load}=(loadstring or load); if ${v_load} then local _f,_e=${v_load}(${v_res}); if _f then pcall(_f) end end end; ${v_run}();`;
    }

    async function runHybridBuild() {
        const source = $('input').value;
        if (!source.trim()) return log("Source missing. Aborting.", "error");

        const btn = $('buildBtn');
        btn.disabled = true;
        btn.innerText = "CALCULATING ORBIT...";
        $('logs').innerHTML = '';
        log("STAR OBFUSCATOR - Version 3.8 Hybrid initiated.", "process");

        await new Promise(r => setTimeout(r, 400));

        try {
            log("Generating Bytecode VM Matrix...");
            const masterKey = Math.floor(Math.random() * 255);
            const bytes = new TextEncoder().encode(source);
            let rollingKey = masterKey;
            let opcodes = [];
            
            for (let i = 0; i < bytes.length; i++) {
                opcodes.push((bytes[i] ^ rollingKey) + (i % 7));
                rollingKey = (rollingKey + 13) % 255;
            }

            const v_ops = randName();
            const v_stk = randName();
            const v_ip = randName();
            const v_run = randName();

            let payload = `local ${v_ops} = {${opcodes.join(',')}} local function ${v_run}() local ${v_stk} = {} local ${v_ip} = ${masterKey} for i=1, #${v_ops} do local v = (${v_ops}[i] - ((i-1)%7)) ${v_stk}[#${v_stk}+1] = string.char(bit32.bxor(v, ${v_ip})) ${v_ip} = (${v_ip} + 13) % 255 end local f, e = (loadstring or load)(table.concat(${v_stk})) if f then pcall(f) end end ${v_run}()`.replace(/\s+/g, ' ');

            const layers = [];
            if ($('opt-rot').checked) layers.push("rotation");
            if ($('opt-xor').checked) layers.push("xor");
            if ($('opt-inv').checked) layers.push("inversion");

            log(`Stacking ${layers.length} atmospheric security layers...`, "process");
            
            layers.sort(() => Math.random() - 0.5);

            for(let l of layers) {
                log(`Applying ${l.toUpperCase()} doing it :3...`);
                payload = wrapLayer(payload, l).replace(/\s+/g, ' ');
                await new Promise(r => setTimeout(r, 100));
            }

            $('output').value = STAR_WATERMARK + payload;
            log("Build successful. Payload encrypted.", "success");

        } catch (e) {
            log("Critical Kernel Failure: " + e.message, "error");
        }

        btn.disabled = false;
        btn.innerText = "Obfuscator";
    }

    function copyResult() {
        $('output').select();
        document.execCommand('copy');
        log("Copied payload to clipboard.", "success");
    }

    $('input').value = ``;
</script>
</body>
</html>
